name: 发布新版本

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  # ── macOS 构建 ─────────────────────────────────────────────────────────────
  build-mac:
    name: 构建 macOS (Universal)
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 构建 macOS 安装包
        run: npm run build:mac

      - name: 上传至 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "财流镜 ${{ github.ref_name }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: dist/*-universal.dmg

  # ── Windows 构建 ───────────────────────────────────────────────────────────
  build-win:
    name: 构建 Windows (x64)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 构建 Windows 安装包
        run: npm run build:win

      - name: 上传至 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "财流镜 ${{ github.ref_name }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: dist/*-x64.exe
